# Telegraf Configuration for Digital Twin Supply Chain
# Collects MQTT sensor data and writes to InfluxDB

[agent]
  interval = "10s"
  round_interval = true
  metric_batch_size = 1000
  metric_buffer_limit = 10000
  collection_jitter = "0s"
  flush_interval = "10s"
  flush_jitter = "0s"
  precision = "0s"
  hostname = ""
  omit_hostname = false
  debug = true
  quiet = false

# MQTT Consumer Input Plugin
[[inputs.mqtt_consumer]]
  servers = ["tcp://mosquitto:1883"]
  
  # Subscribe to all IoT topics (updated for new architecture)
  topics = [
    "iot/simulation/#",
    "iot/truck/#",
    "iot/warehouse/#",
    "iot/retailer/#",
    "iot/events/#"
  ]
  
  # MQTT QoS (0 = at most once, 1 = at least once, 2 = exactly once)
  qos = 0
  
  # Connection timeout
  connection_timeout = "30s"
  
  # Data format
  data_format = "json"
  
  # DISABLED: JSON time parsing (causes silent failures)
  # Simulation sends timestamp in MINUTES (not unix seconds)
  # json_time_key = "timestamp"
  # json_time_format = "unix"
  
  # TOPIC PARSING - Extract measurement from topic structure
  # Format: iot/<entity_type>/<sub_type>
  # Examples:
  #   iot/simulation/events -> simulation_metadata
  #   iot/truck/telemetry -> truck_telemetry  
  #   iot/truck/state -> truck_state
  #   iot/warehouse/state -> warehouse_state
  #   iot/retailer/state -> retailer_state
  #   iot/events/all -> events
  topic_tag = "topic"
  
  # Tag keys from JSON (updated for new architecture)
  tag_keys = [
    "run_id",
    "truck_id",
    "warehouse_id",
    "retailer_id",
    "event_type",
    "status",
    "truck_type",
    "cargo_batch_id",
    "order_id"
  ]

# InfluxDB v2 Output Plugin
[[outputs.influxdb_v2]]
  urls = ["${INFLUX_URL}"]
  token = "${INFLUX_TOKEN}"
  organization = "${INFLUX_ORG}"
  bucket = "${INFLUX_BUCKET}"
  
  # Timeout for HTTP writes
  timeout = "5s"
  
  # HTTP User-Agent
  user_agent = "telegraf"
  
  # Content encoding (gzip for compression)
  content_encoding = "gzip"

# Measurement name mapping based on topic
# Using override processors to rename measurements from mqtt_consumer

# Simulation metadata
[[processors.override]]
  namepass = ["mqtt_consumer"]
  [processors.override.tags]
    topic = "iot/simulation/events"
  name_override = "simulation_metadata"

# Events
[[processors.override]]
  namepass = ["mqtt_consumer"]
  [processors.override.tags]
    topic = "iot/events/all"
  name_override = "events"

# Warehouse state
[[processors.override]]
  namepass = ["mqtt_consumer"]
  [processors.override.tags]
    topic = "iot/warehouse/state"
  name_override = "warehouse_state"

# Retailer state
[[processors.override]]
  namepass = ["mqtt_consumer"]
  [processors.override.tags]
    topic = "iot/retailer/state"
  name_override = "retailer_state"

# Truck state
[[processors.override]]
  namepass = ["mqtt_consumer"]
  [processors.override.tags]
    topic = "iot/truck/state"
  name_override = "truck_state"

# Truck telemetry
[[processors.override]]
  namepass = ["mqtt_consumer"]
  [processors.override.tags]
    topic = "iot/truck/telemetry"
  name_override = "truck_telemetry"
